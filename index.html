<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="CompTIA Network+ N10-009 Study Game - Learn 120+ acronyms through interactive Connections gameplay">
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Google Fonts - Professional & Modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            950: '#0f1419',
                            900: '#1a1f2e',
                            800: '#252d3d',
                            700: '#3a4558',
                        },
                        neon: {
                            purple: '#a78bfa',
                            cyan: '#06b6d4',
                            green: '#10b981',
                            amber: '#f59e0b',
                        }
                    }
                }
            }
        }
    </script>
    
    <title>Network+ Study Game</title>
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #f1f5f9;
            overflow-x: hidden;
        }
        
        body {
            background: transparent;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Smooth scrolling */
        * {
            scroll-behavior: smooth;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(167, 139, 250, 0.5); }
            50% { box-shadow: 0 0 40px rgba(167, 139, 250, 0.8); }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .animate-slide-in {
            animation: slideInLeft 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .animate-scale-in {
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .shake {
            animation: shake 0.4s cubic-bezier(0.36, 0, 0.66, -0.56);
        }
        
        .glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        /* Cards */
        .card-base {
            background: rgba(26, 31, 46, 0.6);
            border: 1px solid rgba(167, 139, 250, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .card-base:hover {
            border-color: rgba(167, 139, 250, 0.3);
            transform: translateY(-2px);
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(26, 31, 46, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Text shadow for depth */
        .text-glow {
            text-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script type="module">
        const React = window.React;
        const ReactDOM = window.ReactDOM;
        const { useState, useEffect, useCallback, useMemo } = React;

        // ========== PUZZLE DATA ==========
        const PUZZLES = [
            {
                id: 1,
                title: "Layer 1 & 2: Physical & Data Link",
                difficulty: "Beginner",
                category: "Foundations",
                words: ["BNC", "LC", "SC", "ST", "MAC", "ARP", "CAM", "VLAN", "SVI", "NIC", "SSID", "BSSID", "STP", "RSTP", "LLDP", "CDP"],
                categories: [
                    { name: "Layer 1: Fiber Connectors", words: ["BNC", "LC", "SC", "ST"], color: "purple", desc: "Physical connectors" },
                    { name: "Layer 2: MAC & Addressing", words: ["MAC", "ARP", "CAM", "NIC"], color: "cyan", desc: "Hardware addressing" },
                    { name: "Layer 2: VLANs & Wireless", words: ["VLAN", "SVI", "SSID", "BSSID"], color: "green", desc: "Logical segmentation" },
                    { name: "Layer 2: Loop Prevention", words: ["STP", "RSTP", "LLDP", "CDP"], color: "amber", desc: "Protocol discovery" }
                ]
            },
            {
                id: 2,
                title: "Layer 3 & 4: Network & Transport",
                difficulty: "Intermediate",
                category: "Routing & Transport",
                words: ["IP", "ICMP", "CIDR", "NAT", "BGP", "OSPF", "EIGRP", "RIP", "TCP", "UDP", "QoS", "TTL", "GRE", "VIP", "ACL", "PAT"],
                categories: [
                    { name: "Layer 3: IP & ICMP", words: ["IP", "ICMP", "CIDR", "NAT"], color: "purple", desc: "Logical addressing" },
                    { name: "Layer 3: Routing Protocols", words: ["BGP", "OSPF", "EIGRP", "RIP"], color: "cyan", desc: "Path selection" },
                    { name: "Layer 4: TCP & UDP", words: ["TCP", "UDP", "QoS", "TTL"], color: "green", desc: "End-to-end delivery" },
                    { name: "Layer 3: Tunneling & Control", words: ["GRE", "VIP", "ACL", "PAT"], color: "amber", desc: "Encapsulation & rules" }
                ]
            },
            {
                id: 3,
                title: "Layer 7: Application Protocols",
                difficulty: "Intermediate",
                category: "Services",
                words: ["HTTP", "HTTPS", "FTP", "SFTP", "SSH", "SMTP", "DNS", "DHCP", "SNMP", "LDAP", "RDP", "SMB", "NTP", "TFTP", "API", "CDN"],
                categories: [
                    { name: "Web & Email", words: ["HTTP", "HTTPS", "SMTP", "SFTP"], color: "purple", desc: "Content & messaging" },
                    { name: "Remote Access", words: ["SSH", "RDP", "LDAP", "SMB"], color: "cyan", desc: "System management" },
                    { name: "Network Services", words: ["DNS", "DHCP", "SNMP", "NTP"], color: "green", desc: "Infrastructure" },
                    { name: "File Transfer & Web", words: ["FTP", "TFTP", "API", "CDN"], color: "amber", desc: "Data distribution" }
                ]
            },
            {
                id: 4,
                title: "Encryption & Security",
                difficulty: "Advanced",
                category: "Security",
                words: ["SSL", "TLS", "DNSSEC", "DoH", "DoT", "PKI", "IKE", "ESP", "AH", "IPsec", "MFA", "SAML", "SSO", "RADIUS", "TACACS+", "VPN"],
                categories: [
                    { name: "Encryption Protocols", words: ["SSL", "TLS", "DoH", "DoT"], color: "purple", desc: "Transport security" },
                    { name: "IPsec Components", words: ["IPsec", "IKE", "ESP", "AH"], color: "cyan", desc: "VPN suite" },
                    { name: "Identity & Access", words: ["MFA", "SAML", "SSO", "PKI"], color: "green", desc: "Authentication" },
                    { name: "AAA & VPN", words: ["RADIUS", "TACACS+", "VPN", "DNSSEC"], color: "amber", desc: "Authorization" }
                ]
            },
            {
                id: 5,
                title: "Cloud, SDN & Modern Architecture",
                difficulty: "Advanced",
                category: "Modern Tech",
                words: ["SDN", "NFV", "SD-WAN", "SASE", "ZTA", "IaC", "VPC", "VXLAN", "IaaS", "PaaS", "SaaS", "IoT", "OT", "ICS", "SCADA", "SSE"],
                categories: [
                    { name: "Software-Defined Networking", words: ["SDN", "NFV", "SD-WAN", "SASE"], color: "purple", desc: "Programmable networks" },
                    { name: "Cloud Service Models", words: ["IaaS", "PaaS", "SaaS", "VPC"], color: "cyan", desc: "Cloud deployment" },
                    { name: "Virtualization & Zero Trust", words: ["VXLAN", "IaC", "ZTA", "SSE"], color: "green", desc: "Virtual infrastructure" },
                    { name: "Industrial & IoT", words: ["IoT", "OT", "ICS", "SCADA"], color: "amber", desc: "Control systems" }
                ]
            },
            {
                id: 6,
                title: "Operations & Compliance",
                difficulty: "Intermediate",
                category: "Operations",
                words: ["SLA", "RTO", "RPO", "MTTR", "MTBF", "IPAM", "MIB", "AUP", "GDPR", "PCI DSS", "BYOD", "DR", "EOL", "EOS", "GUI", "CLI"],
                categories: [
                    { name: "SLA & Disaster Recovery", words: ["SLA", "RTO", "RPO", "MTTR"], color: "purple", desc: "Service metrics" },
                    { name: "Reliability & Lifecycle", words: ["MTBF", "DR", "EOL", "EOS"], color: "cyan", desc: "Hardware & support" },
                    { name: "Management Tools", words: ["IPAM", "MIB", "GUI", "CLI"], color: "green", desc: "Admin interfaces" },
                    { name: "Policy & Compliance", words: ["AUP", "GDPR", "PCI DSS", "BYOD"], color: "amber", desc: "Governance" }
                ]
            }
        ];

        const COLOR_MAP = {
            purple: "from-purple-600 to-purple-400",
            cyan: "from-cyan-600 to-cyan-400",
            green: "from-green-600 to-green-400",
            amber: "from-amber-600 to-amber-400",
        };

        const shuffle = (arr) => {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        // ========== MAIN APP ==========
        function App() {
            const [currentPuzzleId, setCurrentPuzzleId] = useState(1);
            const [gameState, setGameState] = useState(null);
            const [streak, setStreak] = useState(0);

            const currentPuzzle = useMemo(() => PUZZLES.find(p => p.id === currentPuzzleId), [currentPuzzleId]);

            // Initialize game
            useEffect(() => {
                if (!currentPuzzle) return;
                const shuffledTerms = shuffle(currentPuzzle.words.map((word, idx) => ({
                    id: `${currentPuzzleId}-${idx}`,
                    word,
                    categoryIdx: currentPuzzle.categories.findIndex(c => c.words.includes(word))
                })));

                setGameState({
                    terms: shuffledTerms,
                    selected: [],
                    solved: [],
                    mistakes: 4,
                    gameOver: false,
                    won: false,
                    message: '',
                    shake: false
                });
            }, [currentPuzzleId, currentPuzzle]);

            const toggleSelect = useCallback((termId) => {
                if (!gameState || gameState.gameOver || gameState.won) return;
                setGameState(prev => ({
                    ...prev,
                    selected: prev.selected.includes(termId)
                        ? prev.selected.filter(id => id !== termId)
                        : prev.selected.length < 4 ? [...prev.selected, termId] : prev.selected,
                    message: ''
                }));
            }, [gameState]);

            const submitGuess = useCallback(() => {
                if (!gameState || gameState.selected.length !== 4) return;

                const matchedIdx = currentPuzzle.categories.findIndex(cat =>
                    gameState.selected.every(id => {
                        const term = gameState.terms.find(t => t.id === id);
                        return term && cat.words.includes(term.word);
                    })
                );

                if (matchedIdx !== -1) {
                    const newSolved = [...gameState.solved, matchedIdx];
                    const isWon = newSolved.length === 4;
                    if (isWon) setStreak(s => s + 1);

                    setGameState(prev => ({
                        ...prev,
                        solved: newSolved,
                        selected: [],
                        won: isWon,
                        message: isWon ? '✨ Perfect!' : '✓ Correct!',
                        shake: false
                    }));
                } else {
                    const oneAway = currentPuzzle.categories.some(cat =>
                        gameState.selected.filter(id => {
                            const term = gameState.terms.find(t => t.id === id);
                            return term && cat.words.includes(term.word);
                        }).length === 3
                    );

                    if (oneAway) {
                        setGameState(prev => ({
                            ...prev,
                            selected: [],
                            message: '⚠ One away!',
                            shake: true
                        }));
                    } else {
                        const newMistakes = gameState.mistakes - 1;
                        if (newMistakes <= 0) setStreak(0);

                        setGameState(prev => ({
                            ...prev,
                            selected: [],
                            mistakes: newMistakes,
                            gameOver: newMistakes <= 0,
                            message: newMistakes <= 0 ? '✗ Game Over' : '✗ Wrong',
                            shake: true
                        }));
                    }
                }
            }, [gameState, currentPuzzle]);

            const nextPuzzle = useCallback(() => {
                setCurrentPuzzleId(prev => prev === 6 ? 1 : prev + 1);
            }, []);

            if (!gameState || !currentPuzzle) return null;

            const unsolvedTerms = gameState.terms.filter(t => !gameState.solved.includes(t.categoryIdx));

            return React.createElement('div', { className: 'min-h-screen flex flex-col' },
                // Header
                React.createElement('header', { className: 'animate-fade-in-up py-8 px-4 text-center' },
                    React.createElement('h1', { className: 'font-display text-5xl md:text-6xl font-bold mb-2 text-glow' }, 'Network+'),
                    React.createElement('p', { className: 'text-slate-400 text-lg mb-4' }, `Puzzle ${currentPuzzleId}/6 • ${currentPuzzle.title}`),
                    React.createElement('p', { className: 'text-slate-500 text-sm' }, `${currentPuzzle.category} • ${currentPuzzle.difficulty}`)
                ),

                // Stats Bar
                React.createElement('div', { className: 'px-4 mb-8' },
                    React.createElement('div', { className: 'max-w-3xl mx-auto glass rounded-2xl p-6 flex justify-around' },
                        React.createElement('div', { className: 'text-center' },
                            React.createElement('div', { className: 'text-3xl font-bold text-purple-400' }, streak),
                            React.createElement('div', { className: 'text-xs text-slate-400 uppercase tracking-widest mt-1' }, 'Streak')
                        ),
                        React.createElement('div', { className: 'text-center' },
                            React.createElement('div', { className: `text-3xl font-bold ${gameState.mistakes === 0 ? 'text-red-400' : gameState.mistakes <= 2 ? 'text-amber-400' : 'text-slate-300'}` }, gameState.mistakes),
                            React.createElement('div', { className: 'text-xs text-slate-400 uppercase tracking-widest mt-1' }, 'Mistakes')
                        ),
                        React.createElement('div', { className: 'text-center' },
                            React.createElement('div', { className: 'text-3xl font-bold text-green-400' }, `${gameState.solved.length}/4`),
                            React.createElement('div', { className: 'text-xs text-slate-400 uppercase tracking-widest mt-1' }, 'Solved')
                        )
                    )
                ),

                // Main Content
                React.createElement('main', { className: 'flex-1 px-4 pb-8' },
                    // Message
                    gameState.message && React.createElement('div', { className: `max-w-3xl mx-auto mb-6 p-4 rounded-xl animate-scale-in ${
                        gameState.message.includes('✓') || gameState.message.includes('✨') ? 'bg-green-900/30 border border-green-500/50 text-green-300' :
                        gameState.message.includes('⚠') ? 'bg-amber-900/30 border border-amber-500/50 text-amber-300' :
                        'bg-red-900/30 border border-red-500/50 text-red-300'
                    }` }, gameState.message),

                    // Game Grid
                    React.createElement('div', { className: `max-w-3xl mx-auto ${gameState.shake ? 'shake' : ''}` },
                        React.createElement('div', { className: 'grid grid-cols-4 gap-2 mb-8' },
                            unsolvedTerms.map((term, idx) => {
                                const isSelected = gameState.selected.includes(term.id);
                                const cat = currentPuzzle.categories[term.categoryIdx];
                                const gradient = COLOR_MAP[cat.color];

                                return React.createElement('button', {
                                    key: term.id,
                                    onClick: () => toggleSelect(term.id),
                                    disabled: gameState.gameOver || gameState.won,
                                    className: `aspect-square rounded-xl font-display font-bold text-sm md:text-base transition-all duration-300 transform ${
                                        isSelected
                                            ? `bg-gradient-to-br ${gradient} text-white shadow-lg scale-105 glow`
                                            : 'card-base text-slate-200 hover:text-slate-100'
                                    }`,
                                }, term.word);
                            })
                        )
                    ),

                    // Solved Categories
                    gameState.solved.length > 0 && React.createElement('div', { className: 'max-w-3xl mx-auto space-y-3 mb-8' },
                        gameState.solved.map(catIdx => {
                            const cat = currentPuzzle.categories[catIdx];
                            const gradient = COLOR_MAP[cat.color];
                            return React.createElement('div', {
                                key: catIdx,
                                className: `bg-gradient-to-r ${gradient} rounded-xl p-4 animate-slide-in`
                            },
                                React.createElement('div', { className: 'font-bold text-white' }, cat.name),
                                React.createElement('div', { className: 'text-sm text-white/80 mt-1' }, cat.desc)
                            );
                        })
                    ),

                    // Controls
                    React.createElement('div', { className: 'max-w-3xl mx-auto' },
                        React.createElement('div', { className: 'grid grid-cols-2 gap-3 mb-4' },
                            React.createElement('button', {
                                onClick: submitGuess,
                                disabled: gameState.selected.length !== 4,
                                className: 'py-3 rounded-xl font-display font-bold bg-purple-600 hover:bg-purple-500 disabled:bg-slate-700 disabled:text-slate-500 text-white transition-all'
                            }, 'Submit'),
                            React.createElement('button', {
                                onClick: () => setGameState(prev => ({ ...prev, terms: shuffle(prev.terms.filter(t => !prev.solved.includes(t.categoryIdx))) })),
                                disabled: gameState.gameOver || gameState.won,
                                className: 'py-3 rounded-xl font-display font-bold bg-slate-700 hover:bg-slate-600 disabled:bg-slate-800 text-slate-300 transition-all'
                            }, 'Shuffle')
                        )
                    )
                ),

                // Win/Lose State
                (gameState.won || gameState.gameOver) && React.createElement('div', { className: 'fixed inset-0 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fade-in-up' },
                    React.createElement('div', { className: 'glass rounded-3xl p-8 text-center max-w-md animate-scale-in' },
                        React.createElement('h2', { className: 'font-display text-4xl font-bold mb-4' },
                            gameState.won ? '🎉 Solved!' : '💔 Game Over'
                        ),
                        React.createElement('p', { className: 'text-slate-400 mb-6' },
                            gameState.won ? `Streak: ${streak}` : 'Try again!'
                        ),
                        React.createElement('button', {
                            onClick: nextPuzzle,
                            className: 'w-full py-3 rounded-xl font-display font-bold bg-gradient-to-r from-purple-600 to-cyan-600 text-white hover:from-purple-500 hover:to-cyan-500 transition-all'
                        }, currentPuzzleId === 6 ? 'Start Over' : `Puzzle ${currentPuzzleId + 1}`)
                    )
                ),

                // Service Worker
                React.createElement('script', null, `
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
                    }
                `)
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
